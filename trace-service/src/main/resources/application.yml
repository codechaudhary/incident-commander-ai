spring:

  datasource:
    url: jdbc:postgresql://localhost:5432/incidents
    username: incidents
    password: incidents

  jpa:

    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:

    bootstrap-servers: localhost:9092

    producer:

      key-serializer: org.apache.kafka.common.serialization.StringSerializer

      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

trace:

  kafka:

    topics:

      trace-ingested: trace-ingested-topic

server:
  port: 8082

management:

  endpoints:

    web:

      exposure:

        include:
          - health
          - info