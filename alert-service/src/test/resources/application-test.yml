spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  flyway:
    enabled: false
  kafka:
    consumer:
      auto-offset-reset: earliest
    bootstrap-servers: ${spring.embedded.kafka.brokers}

alert:
  kafka:
    topics:
      trace-ingested: trace-ingested-test-topic
      alert-events: alert-events-test-topic
  redis:
    channels:
      alerts-live: "alerts-live-test-channel"

logging:
  level:
    com.incident.alert: DEBUG
