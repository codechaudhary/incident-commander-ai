spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:incidents}
    username: ${POSTGRES_USER:incidents}
    password: ${POSTGRES_PASSWORD:incidents}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 25
        order_inserts: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_alert
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: alert-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.incident.alert.model.kafka"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.incident.alert.model.kafka.TraceIngestedEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000

server:
  port: 8083

alert:
  kafka:
    topics:
      trace-ingested: trace-ingested-topic
      alert-events: alert-events-topic
  redis:
    channels:
      alerts-live: "alerts:live"

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info

logging:
  level:
    com.incident.alert: INFO
    org.springframework.kafka: WARN
    org.springframework.data.redis: WARN
